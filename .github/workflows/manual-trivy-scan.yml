name: Manual Trivy Image Scan

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to scan (e.g., latest, sha-xxxx)'
        required: true
        default: 'latest'

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner on Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository }}:${{ github.event.inputs.image_tag }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
